# Conda development environment for zppy with AI agent dependencies.
# To set up:
# conda env create -f conda/dev_ai.yml -n zppy_ai_dev
# pip install -e ".[ai]"
name: zppy_ai_dev
channels:
  - conda-forge
dependencies:
  # Build
  # =======================
  - python >=3.11,<3.15
  - pip
  # Base (same as dev.yml)
  # =================
  - configobj>=5.0.6
  - jinja2>=3.1.2
  - mache>=1.5.0
  - mpas_tools>=0.15.0
  - pillow>=9.2.0
  # Testing
  # =======================
  - pytest
  - pytest-cov
  # AI Dependencies
  # =======================
  - pip:
    - anthropic>=0.39.0
    - chromadb>=0.4.0
    - sentence-transformers>=2.2.0
