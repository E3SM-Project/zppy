# Conda development environment for zppy with AI agent dependencies.
# To set up:
# conda env create -f conda/dev_ai.yml -n zppy_ai_dev
# pip install -e ".[ai]"
name: zppy_ai_dev
channels:
  - conda-forge
dependencies:
  # Build
  # =======================
  - python >=3.11,<3.15
  - pip
  # Testing
  # =======================
  - pytest
  - pytest-cov
  # AI + zppy base dependencies via pip for broad Python version compatibility.
  # mache and mpas_tools are omitted — not needed for AI agent development.
  - pip:
    - configobj>=5.0.6
    - anthropic>=0.39.0
    - chromadb>=0.4.0
