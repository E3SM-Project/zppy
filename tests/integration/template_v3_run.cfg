[default]
# Use default.ini values of:
# input_subdir = archive/atm/hist
case = v3.LR.historical_0051
constraint = "#expand constraint#"
dry_run = "#expand dry_run#"
environment_commands = "#expand environment_commands#"
# TODO: we need this simulation on Compy and Perlmutter too
# Then, we can prefix it with `#expand user_input#/` instead of hard-coding the LCRC path.
input = /lcrc/group/e3sm2/ac.wlin/E3SMv3/v3.LR.historical_0051
mapping_file = "map_ne30pg2_to_cmip6_180x360_aave.20200201.nc"
output = "#expand user_output#zppy_test_v3_run_output/#expand unique_id#/E3SMv3/v3.LR.historical_0051"
partition = "#expand partition_short#"
qos = "#expand qos_short#"
walltime = "00:30:00"
www = "#expand user_www#zppy_test_v3_run_www/#expand unique_id#"


[climo]
active = True
years = "1985:1989:2", "1985:1989:4",

  [[ atm_monthly_180x360_aave ]]
  # Use default.ini values of:
  #frequency = "monthly"
  #input_files = "eam.h0"
  vars = ""

  [[ atm_monthly_diurnal_8xdaily_180x360_aave ]]
  frequency = "diurnal_8xdaily"
  input_files = "eam.h3"
  vars = "PRECT"

  [[ land_monthly_climo ]]
  # Use default.ini values of:
  #frequency = "monthly"
  input_files = "elm.h0"
  input_subdir = "archive/lnd/hist"
  vars = ""

[ts]
active = True
e3sm_to_cmip_environment_commands = "#expand e3sm_to_cmip_environment_commands#"
years = "1985:1989:2",

  [[ atm_monthly_180x360_aave ]]
  # Use default.ini values of:
  #frequency = "monthly"
  #input_files = "eam.h0"
  vars = "FSNTOA,FLUT,FSNT,FLNT,FSNS,FLNS,SHFLX,QFLX,TAUX,TAUY,PRECC,PRECL,PRECSC,PRECSL,TS,TREFHT,CLDTOT,CLDHGH,CLDMED,CLDLOW,U,ICEFRAC,LANDFRAC,OCNFRAC,PS,CLDICE,CLDLIQ,T,AODDUST"
  ts_fmt = "cmip"

  [[ atm_daily_180x360_aave ]]
  frequency = "daily"
  input_files = "eam.h1"
  vars = "FLUT,PRECT,U850"

  [[ atm_monthly_glb ]]
  # Note global average won't work for 3D variables.
  # Use default.ini values of:
  #frequency = "monthly"
  #input_files = "eam.h0"
  mapping_file = "glb"
  years = "1985:1995:5",

  [[ land_monthly ]]
  # Use default.ini values of:
  #frequency = "monthly"
  e3sm_to_cmip_environment_commands = "#expand e3sm_to_cmip_environment_commands#"
  extra_vars = "landfrac"
  input_files = "elm.h0"
  input_subdir = "archive/lnd/hist"
  mapping_file = map_r05_to_cmip6_180x360_aave.20231110.nc
  vars = "FSH,RH2M,LAISHA,LAISUN,QINTR,QOVER,QRUNOFF,QSOIL,QVEGE,QVEGT,SOILICE,SOILLIQ,SOILWATER_10CM,TSA,TSOI,H2OSNO,TOTLITC,CWDC,SOIL1C,SOIL2C,SOIL3C,SOIL4C,WOOD_HARVESTC,TOTVEGC,NBP,GPP,AR,HR"
  ts_fmt = "cmip"

  [[ lnd_monthly_glb ]]
  # Use default.ini values of:
  #frequency = "monthly"
  input_files = "elm.h0"
  input_subdir = "archive/lnd/hist"
  mapping_file = "glb"
  vars = "FSH,RH2M,LAISHA,LAISUN,QINTR,QOVER,QRUNOFF,QSOIL,QVEGE,QVEGT,SOILWATER_10CM,TSA,H2OSNO,TOTLITC,CWDC,SOIL1C,SOIL2C,SOIL3C,SOIL4C,WOOD_HARVESTC,TOTVEGC,NBP,GPP,AR,HR"
  years = "1985:1995:5",

  [[ rof_monthly ]]
  # Use default.ini values of:
  #frequency = "monthly"
  extra_vars = 'areatotal2'
  frequency = "monthly"
  input_files = "mosart.h0"
  input_subdir = "archive/rof/hist"
  mapping_file = ""
  vars = "RIVER_DISCHARGE_OVER_LAND_LIQ"

[tc_analysis]
active = True
scratch = "#expand scratch#"
years = "1985:1995:2",


[e3sm_diags]
active = True
grid = '180x360_aave'
multiprocessing = True
num_workers = 8
ref_final_yr = 2014
ref_start_yr = 1985
short_name = 'v3.LR.historical_0051'
ts_num_years = 2
years = "1985:1989:2", "1985:1989:4",


  [[ atm_monthly_180x360_aave ]]
  climo_diurnal_frequency = "diurnal_8xdaily"
  climo_diurnal_subsection = "atm_monthly_diurnal_8xdaily_180x360_aave"
  dc_obs_climo = '/lcrc/group/e3sm/public_html/e3sm_diags_test_data/unit_test_complete_run/obs/climatology'
  obs_ts = '/lcrc/soft/climate/e3sm_diags_data/obs_for_e3sm_diags/time-series'
  output_format_subplot = "pdf",
  partition = "#expand partition_long#"
  qos = "#expand qos_long#"
  #reference_data_path = '/lcrc/soft/climate/e3sm_diags_data/obs_for_e3sm_diags/climatology'
  sets = "lat_lon","zonal_mean_xy","zonal_mean_2d","polar","cosp_histogram","meridional_mean_2d","annual_cycle_zonal_mean","qbo","diurnal_cycle","zonal_mean_2d_stratosphere","aerosol_aeronet","tropical_subseasonal",
  ts_daily_subsection = "atm_daily_180x360_aave"
  walltime = "#expand diags_walltime#"


